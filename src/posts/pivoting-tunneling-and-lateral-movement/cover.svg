<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0d0e"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="glow" cx="15%" cy="85%" r="55%">
      <stop offset="0" stop-color="#e5484d" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e5484d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- grid -->
  <g stroke="#1c1c1f" stroke-width="1">
    <path d="M0 158 H1200 M0 316 H1200 M0 474 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/>
  </g>
  <!-- decorative pivot chain: boxes connected by arrows (top right) -->
  <g fill="none" stroke="#2a2a2e" stroke-width="2">
    <!-- boxes -->
    <rect x="870" y="60" width="60" height="36" rx="4"/>
    <rect x="980" y="60" width="60" height="36" rx="4"/>
    <rect x="1090" y="60" width="70" height="36" rx="4"/>
    <!-- arrows between boxes -->
    <line x1="930" y1="78" x2="979" y2="78"/>
    <polyline points="971,70 980,78 971,86"/>
    <line x1="1040" y1="78" x2="1089" y2="78"/>
    <polyline points="1081,70 1090,78 1081,86"/>
    <!-- dashed line from last box (tunneling implied) -->
    <line x1="1160" y1="78" x2="1200" y2="78" stroke-dasharray="4,4"/>
  </g>
  <text x="876" y="83" font-family="'JetBrains Mono', monospace" font-size="11" fill="#3a3a3e">Attacker</text>
  <text x="988" y="83" font-family="'JetBrains Mono', monospace" font-size="11" fill="#3a3a3e">Pivot</text>
  <text x="1096" y="83" font-family="'JetBrains Mono', monospace" font-size="11" fill="#3a3a3e">Target</text>
  <!-- tunnel label -->
  <text x="1165" y="72" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2a2a2e">SSH/SOCKS</text>
  <!-- main heading -->
  <text x="80" y="290" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="#fafafa">Pivoting &amp;</text>
  <text x="80" y="352" font-family="'JetBrains Mono', monospace" font-size="48" font-weight="700" fill="#e5484d">Tunneling</text>
  <text x="80" y="414" font-family="'JetBrains Mono', monospace" font-size="34" font-weight="700" fill="#fafafa">Lateral Movement</text>
  <!-- subline -->
  <text x="80" y="476" font-family="'JetBrains Mono', monospace" font-size="22" fill="#8a8a93">red team · pivoting · AD attacks</text>
</svg>
