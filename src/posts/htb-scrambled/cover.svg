    <rect x="308" y="164" width="8" height="8" fill="#e5484d" opacity="0.5"/>
    <rect x="304" y="240" width="8" height="8" fill="#40c060" opacity="0.5"/>
    <rect x="100" y="256" width="8" height="8" fill="#8040c0" opacity="0.5"/>

    <!-- Domain label -->
    <text x="200" y="110" font-family="'JetBrains Mono', monospace" font-size="13" fill="#4060e0" text-anchor="middle" font-weight="700" letter-spacing="3">SCRM.LOCAL</text>
    <text x="200" y="127" font-family="'JetBrains Mono', monospace" font-size="8"  fill="#2a3060" text-anchor="middle" letter-spacing="1">NTLM DISABLED · KERBEROS ONLY</text>

    <!-- PIXEL ART KERBEROS KEY (16px blocks) -->
    <!-- Grid origin: x=46, y=152. Block size: 16px. -->
    <!-- Ring row 0 (y=152): cols 1-5 -->
    <rect x="62"  y="152" width="16" height="16" fill="#f0c040"/>
    <rect x="78"  y="152" width="16" height="16" fill="#f0c040"/>
    <rect x="94"  y="152" width="16" height="16" fill="#f0c040"/>
    <rect x="110" y="152" width="16" height="16" fill="#f0c040"/>
    <rect x="126" y="152" width="16" height="16" fill="#f0c040"/>
    <!-- Ring row 1 (y=168): cols 0,1,5,6 -->
    <rect x="46"  y="168" width="16" height="16" fill="#f0c040"/>
    <rect x="62"  y="168" width="16" height="16" fill="#f0c040"/>
    <rect x="126" y="168" width="16" height="16" fill="#f0c040"/>
    <rect x="142" y="168" width="16" height="16" fill="#f0c040"/>
