    <rect x="254" y="200" width="16" height="16" fill="#f0c040"/>
    <!-- Ring row 4 (y=216): cols 0,1,5,6 + teeth at cols 10,14 -->
    <rect x="46"  y="216" width="16" height="16" fill="#f0c040"/>
    <rect x="62"  y="216" width="16" height="16" fill="#f0c040"/>
    <rect x="126" y="216" width="16" height="16" fill="#f0c040"/>
    <rect x="142" y="216" width="16" height="16" fill="#f0c040"/>
    <rect x="206" y="216" width="16" height="16" fill="#f0c040"/>
    <rect x="254" y="216" width="16" height="16" fill="#f0c040"/>
