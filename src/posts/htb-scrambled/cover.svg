    <rect x="280" y="264" width="8" height="8" fill="#40c060"/>
    <rect x="296" y="248" width="8" height="8" fill="#8040c0"/>
    <rect x="316" y="224" width="8" height="8" fill="#40b0c0"/>
    <rect x="328" y="200" width="8" height="8" fill="#e07820"/>
    <rect x="332" y="176" width="8" height="8" fill="#e5484d"/>
    <rect x="328" y="152" width="8" height="8" fill="#4060e0"/>
    <rect x="316" y="128" width="8" height="8" fill="#40c060"/>
    <rect x="296" y="108" width="8" height="8" fill="#8040c0"/>
    <rect x="272" y="92"  width="8" height="8" fill="#40b0c0"/>
    <rect x="248" y="80"  width="8" height="8" fill="#e07820"/>
