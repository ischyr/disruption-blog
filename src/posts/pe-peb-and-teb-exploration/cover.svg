    <rect x="920" y="55"  width="200" height="28" rx="3"/>
    <rect x="920" y="87"  width="200" height="28" rx="3"/>
    <rect x="920" y="119" width="200" height="28" rx="3"/>
    <rect x="920" y="151" width="200" height="58" rx="3"/>
    <rect x="920" y="213" width="200" height="28" rx="3"/>
  </g>
  <text x="932" y="74"  font-family="'JetBrains Mono', monospace" font-size="13" fill="#3a3a3e">DOS Header</text>
  <text x="932" y="106" font-family="'JetBrains Mono', monospace" font-size="13" fill="#3a3a3e">DOS Stub</text>
  <text x="932" y="138" font-family="'JetBrains Mono', monospace" font-size="13" fill="#3a3a3e">NT Headers</text>
  <text x="932" y="170" font-family="'JetBrains Mono', monospace" font-size="13" fill="#3a3a3e">Section Headers</text>
