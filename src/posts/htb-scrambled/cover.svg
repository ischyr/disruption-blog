<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <clipPath id="clip">
      <circle cx="200" cy="200" r="182"/>
    </clipPath>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#12121e" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Ring frame -->
  <circle cx="200" cy="200" r="200" fill="#080408"/>
  <circle cx="200" cy="200" r="196" fill="#e5484d"/>
  <circle cx="200" cy="200" r="186" fill="#8a1818"/>
  <circle cx="200" cy="200" r="183" fill="#0d0d1a"/>

  <g clip-path="url(#clip)">
    <rect width="400" height="400" fill="#0d0d1a"/>
    <rect width="400" height="400" fill="url(#grid)" opacity="0.7"/>

    <!-- Scattered "scrambled" data blocks (8x8) — represent encrypted chunks -->
    <rect x="80"  y="80"  width="8" height="8" fill="#e5484d"/>
    <rect x="96"  y="72"  width="8" height="8" fill="#4060e0"/>
    <rect x="64"  y="96"  width="8" height="8" fill="#40c060"/>
