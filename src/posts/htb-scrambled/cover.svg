    <rect x="62"  y="232" width="16" height="16" fill="#f0c040"/>
    <rect x="78"  y="232" width="16" height="16" fill="#f0c040"/>
    <rect x="94"  y="232" width="16" height="16" fill="#f0c040"/>
    <rect x="110" y="232" width="16" height="16" fill="#f0c040"/>
    <rect x="126" y="232" width="16" height="16" fill="#f0c040"/>
    <rect x="206" y="232" width="16" height="16" fill="#f0c040"/>
    <!-- Extra tooth block (shadow tone) -->
    <rect x="206" y="248" width="16" height="16" fill="#b08020"/>

    <!-- Silver ticket label below shaft -->
    <text x="162" y="274" font-family="'JetBrains Mono', monospace" font-size="8" fill="#c0c0d0" text-anchor="middle" letter-spacing="1">SILVER TICKET</text>

    <!-- MSSQL database cylinder (8px blocks) at bottom-right -->
    <text x="292" y="274" font-family="'JetBrains Mono', monospace" font-size="8" fill="#506090" text-anchor="middle">MSSQL</text>
    <!-- top cap (y=280): cols 1,2,3 → x=284,292,300 -->
    <rect x="284" y="280" width="8" height="8" fill="#6070a0"/>
    <rect x="292" y="280" width="8" height="8" fill="#7080b0"/>
    <rect x="300" y="280" width="8" height="8" fill="#6070a0"/>
    <!-- top rim (y=288): all 5 cols -->
    <rect x="276" y="288" width="8" height="8" fill="#506090"/>
    <rect x="284" y="288" width="8" height="8" fill="#6070a0"/>
    <rect x="292" y="288" width="8" height="8" fill="#7080b0"/>
    <rect x="300" y="288" width="8" height="8" fill="#6070a0"/>
    <rect x="308" y="288" width="8" height="8" fill="#506090"/>
    <!-- body (y=296,304,312): sides only -->
    <rect x="276" y="296" width="8" height="8" fill="#404070"/>
    <rect x="308" y="296" width="8" height="8" fill="#404070"/>
    <rect x="276" y="304" width="8" height="8" fill="#404070"/>
    <rect x="308" y="304" width="8" height="8" fill="#404070"/>
    <rect x="276" y="312" width="8" height="8" fill="#404070"/>
