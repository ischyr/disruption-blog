    <rect x="200" y="68"  width="8" height="8" fill="#4060e0"/>
    <rect x="176" y="72"  width="8" height="8" fill="#40c060"/>
    <rect x="152" y="80"  width="8" height="8" fill="#8040c0"/>
    <rect x="128" y="72"  width="8" height="8" fill="#40b0c0"/>
    <rect x="104" y="76"  width="8" height="8" fill="#e07820"/>
