    <rect x="46"  y="184" width="16" height="16" fill="#f0c040"/>
    <rect x="142" y="184" width="16" height="16" fill="#f0c040"/>
    <rect x="158" y="184" width="16" height="16" fill="#f0c040"/>
    <rect x="174" y="184" width="16" height="16" fill="#f0c040"/>
    <rect x="190" y="184" width="16" height="16" fill="#f0c040"/>
