    <rect x="284" y="328" width="8" height="8" fill="#506090"/>
    <rect x="292" y="328" width="8" height="8" fill="#404070"/>
    <rect x="300" y="328" width="8" height="8" fill="#506090"/>

    <!-- Bottom labels -->
    <text x="200" y="344" font-family="'JetBrains Mono', monospace" font-size="8"  fill="#303050" text-anchor="middle" letter-spacing="1">hackthebox · windows · active directory</text>
    <text x="200" y="364" font-family="'JetBrains Mono', monospace" font-size="22" fill="#e5484d" text-anchor="middle" font-weight="700" letter-spacing="3">SCRAMBLED</text>
