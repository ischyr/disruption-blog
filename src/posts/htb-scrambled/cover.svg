    <!-- Ring row 3 (y=200): cols 0,6 + shaft cols 7-14 -->
    <rect x="46"  y="200" width="16" height="16" fill="#f0c040"/>
    <rect x="142" y="200" width="16" height="16" fill="#f0c040"/>
    <rect x="158" y="200" width="16" height="16" fill="#f0c040"/>
    <rect x="174" y="200" width="16" height="16" fill="#f0c040"/>
    <rect x="190" y="200" width="16" height="16" fill="#f0c040"/>
